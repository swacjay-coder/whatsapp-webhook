name: Apply V60 Direct

on:
  workflow_dispatch:
  push:
    paths:
      - ".apply-v60-direct-trigger.txt"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Apply V59 base if needed
        run: |
          set -e
          if ! grep -q v31-5-8-59 server.js && ! grep -q v31-5-8-60 server.js; then
            git apply v59.patch
          fi
          node --check server.js

      - name: Apply V60 marker safely
        run: |
          set -e
          python3 -c "from pathlib import Path; p=Path('server.js'); s=p.read_text(); old='const BOT_VERSION = \\\"iconic-team-inbox-v31-5-8-59-direct-booking-intent-abu-dhabi-consultation-and-bot-pause\\\";'; new='const BOT_VERSION = \\\"iconic-team-inbox-v31-5-8-60-flow-customer-name-staff-notifications-and-resume-bot\\\";'; print('old exists=', old in s); print('new exists=', new in s); s=s if new in s else s.replace(old,new,1); p.write_text(s)"
          node --check server.js

      - name: Commit V60 marker
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add server.js
          git commit -m "Apply V60 marker directly" || echo "No changes to commit"
          git push
