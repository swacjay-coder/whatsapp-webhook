name: Apply V60 Direct

on:
  workflow_dispatch:
  push:
    paths:
      - ".apply-v60-direct-trigger.txt"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply V60.3.0
        run: |
          set -e
          python3 v6030_details_label_and_body.py
          node --check server.js
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add server.js v6030_details_label_and_body.py
          git commit -m "Apply V60.3.0 Details label and body" || echo "No changes"
          git push
