name: Apply V60 Direct

on:
  workflow_dispatch:
  push:
    paths:
      - ".apply-v60-direct-trigger.txt"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run V60.1 staff notify fix script
        run: |
          set -e
          python3 v601_fix_flow_staff_notify.py
          node --check server.js

      - name: Commit V60.1 server update
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add server.js package.json
          git commit -m "Apply V60.1 staff notify routing fix" || echo "No changes to commit"
          git push
