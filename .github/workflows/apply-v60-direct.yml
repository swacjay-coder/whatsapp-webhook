name: Apply V60 Direct

on:
  workflow_dispatch:
  push:
    paths:
      - ".apply-v60-direct-trigger.txt"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run V60 direct apply script
        run: |
          set -e
          python3 v60_direct_apply.py
          node --check server.js

      - name: Commit V60 direct server update
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add server.js package.json
          git commit -m "Apply V60 direct server update" || echo "No changes to commit"
          git push
