name: Apply V60 Direct

on:
  workflow_dispatch:
  push:
    paths:
      - ".apply-v60-direct-trigger.txt"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Apply V60.3.0.2 services video-header patch
        run: |
          set -e
          python3 v60302_probe_snippets.py
          node --check server.js

      - name: Commit patch
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add server.js
          if git diff --cached --quiet; then
            echo "No server.js changes to commit"
          else
            git commit -m "Deploy V60.3.0.2 services video header single message"
            git push
          fi
