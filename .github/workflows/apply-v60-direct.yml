name: Apply V60 Direct

on:
  workflow_dispatch:
  push:
    paths:
      - ".apply-v60-direct-trigger.txt"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Apply V59 base if needed
        run: |
          set -e
          if ! grep -q v31-5-8-59 server.js && ! grep -q v31-5-8-60 server.js; then
            git apply v59.patch
          fi
          node --check server.js

      - name: Apply minimal V60 version marker
        run: |
          set -e
          python3 - <<'PY'
from pathlib import Path
p = Path('server.js')
s = p.read_text()
old = 'const BOT_VERSION = "iconic-team-inbox-v31-5-8-59-direct-booking-intent-abu-dhabi-consultation-and-bot-pause";'
new = 'const BOT_VERSION = "iconic-team-inbox-v31-5-8-60-flow-customer-name-staff-notifications-and-resume-bot";'
if new in s:
    print('V60 marker already exists')
elif old in s:
    s = s.replace(old, new, 1)
    p.write_text(s)
    print('V60 marker applied')
else:
    raise SystemExit('BOT_VERSION marker not found')
PY
          node --check server.js

      - name: Commit direct V60 marker
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add server.js
          git commit -m "Apply V60 marker directly" || echo "No changes to commit"
          git push
