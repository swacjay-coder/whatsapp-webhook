              'booking message fields',
              '''    "Source: WhatsApp Flow",
    `Branch: ${flowData.branch || ""}`,
    `Preferred day: ${flowData.preferredDay || ""}`,''',
              '''    "Source: WhatsApp Flow",
    `Branch: ${flowData.branch || ""}`,
    `Customer name: ${flowData.customerName || ""}`,
    `Phone: ${flowData.phone || ""}`,
    `Preferred day: ${flowData.preferredDay || ""}`,'''
          )

          replace_once(
