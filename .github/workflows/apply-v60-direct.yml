name: Apply V60 Direct

on:
  workflow_dispatch:
  push:
    paths:
      - ".apply-v60-direct-trigger.txt"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Debug full V60 direct edits
        run: |
          set +e
          OUT="V60_FULL_DEBUG.md"
          echo "# V60 Full Debug" > "$OUT"
          echo "Started: $(date -u)" >> "$OUT"
          echo "" >> "$OUT"

          python3 <<'PY' >> "$OUT" 2>&1
from pathlib import Path
import json

p = Path('server.js')
s = p.read_text()

checks = [
  ('staff helper old', 'function getStaffNotificationNumber(phoneNumberId, displayPhoneNumber = "") {\n  return getStaffNotificationRouting(phoneNumberId, displayPhoneNumber).number;\n}\n\nasync function sendStaffNotificationTextMessage(to, body, phoneNumberId = DUBAI_PHONE_NUMBER_ID, routing = {}) {'),
  ('staff helper new', 'function getStaffNotificationNumbers(phoneNumberId, displayPhoneNumber = "")'),
  ('flow customer extraction old', '  const teamMemberValue = findFlowResponseValue(payload, ["team_member", "team member", "staff", "employee", "موظف", "فريق"]);\n  const notesValue = findFlowResponseValue(payload, ["notes", "note", "preferred_exact_time", "ملاحظ"]);\n\n  const branch = normalizeFlowBranch(branchValue, lineConfig.branch || "Dubai");'),
  ('flow customer extraction new', 'const customerNameValue = findFlowResponseValue(payload'),
  ('flow return old', '  return {\n    rawPayload: payload,\n    branch,'),
  ('flow return new', 'customerName: cleanCustomerName(customerNameValue'),
  ('booking msg old', '    "Source: WhatsApp Flow",\n    `Branch: ${flowData.branch || ""}`,\n    `Preferred day: ${flowData.preferredDay || ""}`,'),
  ('booking msg new', '`Customer name: ${flowData.customerName || ""}`'),
  ('resume helper old', 'function isBookingMenuText(text) {\n  const value = compactText(text);'),
  ('resume helper new', 'function isResumeBotText(text)'),
  ('flow data old', '  const flowData = getWhatsAppFlowBookingData(message, lineConfig);'),
  ('flow data new', 'const flowData = getWhatsAppFlowBookingData(message, { ...lineConfig, customerName: profileName, phone: from });'),
  ('sheet save old', '  await saveBookingRequestToGoogleSheetFromServer({\n    phone: from,\n    phoneNumberId: incomingPhoneNumberId,\n    customerName: profileName,\n    branch: selectedBranch,\n    message: requestMessage,\n    requestType: flowData.serviceInterest || "WhatsApp Flow Booking",\n    bookingStatus: "Pending"\n  });\n\n  const confirmationBody = buildWhatsAppFlowConfirmationBody(flowData);'),
  ('staff notify new', 'notifyStaffAboutFlowBooking(flowData'),
  ('pause gate old', '    if (!isOptInMessage && !isOptOutMessage && !isReminderDeclineMessage) {\n      const pausedStatus = await getBotPausedStatusForConversation(from, incomingPhoneNumberId);'),
  ('resume gate new', 'if (isResumeBotText(originalText || text))'),
]

print('## Marker checks')
for label, needle in checks:
    print(f'- {label}: {needle in s}')

print('\n## BOT_VERSION line')
for line in s.splitlines():
    if 'BOT_VERSION' in line:
        print(line)
        break
PY

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$OUT"
          git commit -m "Write V60 full debug" >> "$OUT" 2>&1
          git add "$OUT"
          git commit -m "Update V60 full debug" >/dev/null 2>&1 || true
          git push >> "$OUT" 2>&1
          exit 0
