name: Apply V60 Direct

on:
  workflow_dispatch:
  push:
    paths:
      - ".apply-v60-direct-trigger.txt"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply V60.2.6.1
        run: |
          set -e
          python3 v60261_fix_services_id_team_note_robust.py
          node --check server.js
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add server.js v60261_fix_services_id_team_note_robust.py
          git commit -m "Apply V60.2.6.1 robust services id and team pause note" || echo "No changes"
          git push
