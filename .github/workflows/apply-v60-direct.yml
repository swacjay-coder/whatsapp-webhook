name: Apply V60 Direct

on:
  workflow_dispatch:
  push:
    paths:
      - ".apply-v60-direct-trigger.txt"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply V60.2.7.2
        run: |
          set -e
          python3 v60272_force_services_matching.py
          node --check server.js
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add server.js v60272_force_services_matching.py
          git commit -m "Apply V60.2.7.2 force services matching" || echo "No changes"
          git push
