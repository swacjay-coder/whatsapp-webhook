name: Apply V60 Direct

on:
  workflow_dispatch:
  push:
    paths:
      - ".apply-v60-direct-trigger.txt"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Write V60 debug report
        run: |
          set +e
          OUT="V60_FULL_DEBUG.md"
          echo "# V60 Full Debug" > "$OUT"
          echo "Started: $(date -u)" >> "$OUT"
          echo "" >> "$OUT"
          echo "## BOT_VERSION" >> "$OUT"
          grep -n "BOT_VERSION" server.js >> "$OUT" 2>&1
          echo "" >> "$OUT"
          echo "## Marker checks" >> "$OUT"
          grep -Fq "function getStaffNotificationNumber" server.js; echo "staff helper old/new base present: $?" >> "$OUT"
          grep -Fq "function getStaffNotificationNumbers" server.js; echo "staff multi helper present: $?" >> "$OUT"
          grep -Fq "const customerNameValue = findFlowResponseValue" server.js; echo "flow customerName extraction present: $?" >> "$OUT"
          grep -Fq "Customer name: ${flowData.customerName" server.js; echo "booking message customer name present: $?" >> "$OUT"
          grep -Fq "function isResumeBotText" server.js; echo "resume helper present: $?" >> "$OUT"
          grep -Fq "notifyStaffAboutFlowBooking" server.js; echo "staff flow notify present: $?" >> "$OUT"
          grep -Fq "getWhatsAppFlowBookingData(message, { ...lineConfig, customerName: profileName, phone: from })" server.js; echo "flow profile fallback present: $?" >> "$OUT"
          echo "" >> "$OUT"
          echo "## Around flow booking data" >> "$OUT"
          line=$(grep -n "function getWhatsAppFlowBookingData" server.js | head -1 | cut -d: -f1)
          if [ -n "$line" ]; then sed -n "$((line)),$((line+75))p" server.js >> "$OUT"; fi
          echo "" >> "$OUT"
          echo "## Around handle flow submit" >> "$OUT"
          line=$(grep -n "async function handleWhatsAppFlowBookingSubmit" server.js | head -1 | cut -d: -f1)
          if [ -n "$line" ]; then sed -n "$((line)),$((line+90))p" server.js >> "$OUT"; fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$OUT"
          git commit -m "Write V60 full debug" || echo "No debug changes"
          git push
          exit 0
