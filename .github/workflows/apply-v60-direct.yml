name: Apply V60 Direct

on:
  workflow_dispatch:
  push:
    paths:
      - ".apply-v60-direct-trigger.txt"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply V60.2.1
        run: |
          set -e
          python3 v6021_fix_bilingual_header_all_replies.py
          node --check server.js
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add server.js package.json
          git commit -m "Apply V60.2.1 bilingual header fix" || echo "No changes"
          git push
