name: Apply V60 Direct

on:
  workflow_dispatch:
  push:
    paths:
      - ".apply-v60-direct-trigger.txt"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Inspect send functions
        run: |
          set -e
          python3 v602_inspect_send_functions.py
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add V602_SEND_FUNCTIONS.md
          git commit -m "Inspect send functions" || echo "No changes"
          git push
