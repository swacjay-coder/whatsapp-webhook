name: Apply V60 Direct

on:
  workflow_dispatch:
  push:
    paths:
      - ".apply-v60-direct-trigger.txt"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Inspect V60.2.2 replies
        run: |
          set -e
          python3 v6022_inspect_reply_bodies.py
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add V6022_REPLY_BODIES.md
          git commit -m "Inspect V60.2.2 reply bodies" || echo "No changes"
          git push
