name: Apply Chat Background True Color

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/apply-chat-background-true-color.yml"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Apply true-color chat background CSS
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("server.js")
          s = path.read_text(encoding="utf-8")

          old_version = 'const BOT_VERSION = "iconic-team-inbox-v31-5-8-60-3-1-5-inbox-results-details-cache-cleanup";'
          new_version = 'const BOT_VERSION = "iconic-team-inbox-v31-5-8-60-3-1-6-chat-background-true-color";'
          if old_version in s:
              s = s.replace(old_version, new_version, 1)

          old_legacy = '''      background-image:\n        linear-gradient(rgba(246, 252, 243, .46), rgba(241, 249, 238, .50)),\n        var(--iconic-chat-logo-v2285),\n        radial-gradient(circle at 18px 18px, rgba(120,184,62,.055) 1.4px, transparent 1.8px) !important;\n      background-repeat: no-repeat, no-repeat, repeat !important;\n      background-position: center center, center center, 0 0 !important;\n      background-size: cover, min(900px, 84%) auto, 28px 28px !important;\n      background-attachment: scroll, scroll, scroll !important;'''
          new_legacy = '''      background-image: var(--iconic-chat-logo-v2285) !important;\n      background-repeat: no-repeat !important;\n      background-position: center center !important;\n      background-size: min(900px, 84%) auto !important;\n      background-attachment: scroll !important;\n      background-color: #ffffff !important;'''

          old_active = '''      background-image:\n        linear-gradient(rgba(246, 252, 243, .43), rgba(241, 249, 238, .48)),\n        var(--iconic-chat-logo-v2285),\n        radial-gradient(circle at 18px 18px, rgba(120,184,62,.052) 1.4px, transparent 1.8px) !important;\n      background-repeat: no-repeat, no-repeat, repeat !important;\n      background-position: center center, center center, 0 0 !important;\n      background-size: cover, 100% auto, 28px 28px !important;\n      background-attachment: scroll, scroll, scroll !important;'''
          new_active = '''      background-image: var(--iconic-chat-logo-v2285) !important;\n      background-repeat: no-repeat !important;\n      background-position: center center !important;\n      background-size: 100% auto !important;\n      background-attachment: scroll !important;\n      background-color: #ffffff !important;'''

          missing = []
          if old_legacy in s:
              s = s.replace(old_legacy, new_legacy, 1)
          else:
              missing.append("legacy chat background block")

          if old_active in s:
              s = s.replace(old_active, new_active, 1)
          else:
              missing.append("active chat background block")

          if missing:
              raise SystemExit("Missing expected block(s): " + ", ".join(missing))

          path.write_text(s, encoding="utf-8")
          PY

      - name: Syntax check
        run: node --check server.js

      - name: Remove temporary workflow and commit update
        run: |
          rm -f .github/workflows/apply-chat-background-true-color.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add server.js .github/workflows/apply-chat-background-true-color.yml
          git status --short
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Make chat background true color"
          git push

      - name: Trigger Render deploy
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "RENDER_DEPLOY_HOOK_URL secret is missing"
            exit 1
          fi
          HTTP_STATUS=$(curl -sS -o /tmp/render-response.txt -w "%{http_code}" -X POST "$RENDER_DEPLOY_HOOK_URL")
          echo "Render deploy hook HTTP status: $HTTP_STATUS"
          cat /tmp/render-response.txt || true
          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            echo "Render deploy hook failed"
            exit 1
          fi
