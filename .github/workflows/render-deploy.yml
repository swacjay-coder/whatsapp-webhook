name: Deploy to Render

on:
  workflow_dispatch:
  push:
    paths:
      - ".render-deploy-trigger.txt"

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Apply right panel polish directly to server.js
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re
          p = Path('server.js')
          s = p.read_text(encoding='utf-8')
          s = re.sub(r'const BOT_VERSION = "[^"]*";', 'const BOT_VERSION = "iconic-team-inbox-v31-5-8-60-3-1-8-right-panel-direct-css";', s, count=1)
          for old, new in {
            'Customer CRM Profile': 'CRM Profile',
            'Privacy-first profile': 'Private CRM profile',
            'Staff Assignment': 'Team Assignment',
            'Appointment Request': 'Booking Request',
            'Confirm booking': 'Confirm',
            'Suggest another time': 'Suggest time',
            'Mark follow-up': 'Follow-up',
            'Cancel request': 'Cancel',
            'Send customer update': 'Send update'
          }.items():
            s = s.replace(old, new)
          marker = 'V31.5.8.60.3.1.8 - Direct Right Panel Polish'
          css = '''
    /* V31.5.8.60.3.1.8 - Direct Right Panel Polish */
    body .right-reference-panel, body aside.right-reference-panel { background: linear-gradient(180deg,#ffffff,#f7fcf4) !important; }
    body .right-reference-panel .right-reference-scroll { padding: 11px !important; gap: 9px !important; }
    body .right-reference-panel .reference-card { padding: 12px !important; border-radius: 18px !important; border: 1px solid rgba(120,184,62,.28) !important; background: rgba(255,255,255,.96) !important; box-shadow: 0 10px 24px rgba(15,23,42,.06) !important; }
    body .right-reference-panel .reference-card-head { min-height: 30px !important; margin-bottom: 9px !important; align-items: center !important; gap: 8px !important; }
    body .right-reference-panel .reference-card-head h3 { font-size: 14px !important; line-height: 1.05 !important; font-weight: 950 !important; color: #16352b !important; letter-spacing: -.01em !important; }
    body .right-reference-panel .customer-details-card .reference-card-head h3::before { content: "CRM" !important; width: 25px !important; height: 25px !important; min-width: 25px !important; border-radius: 10px !important; display: inline-flex !important; align-items:center !important; justify-content:center !important; margin-right: 6px !important; font-size: 8px !important; font-weight: 950 !important; background: #eef9e8 !important; border: 1px solid rgba(120,184,62,.25) !important; }
    body .right-reference-panel .booking-request-card .reference-card-head h3::before { content: "REQ" !important; width: 25px !important; height: 25px !important; min-width: 25px !important; border-radius: 10px !important; display: inline-flex !important; align-items:center !important; justify-content:center !important; margin-right: 6px !important; font-size: 8px !important; font-weight: 950 !important; background: #fff7df !important; border: 1px solid rgba(245,158,11,.28) !important; }
    body .right-reference-panel .customer-details-top { min-height: 46px !important; padding: 8px !important; gap: 9px !important; border-radius: 15px !important; background: linear-gradient(135deg,#f0faec,#ffffff) !important; }
    body .right-reference-panel .reference-avatar { width: 38px !important; height: 38px !important; min-width: 38px !important; border-radius: 14px !important; font-size: 12px !important; font-weight: 950 !important; }
    body .right-reference-panel .customer-name { font-size: 12.5px !important; line-height: 1.1 !important; font-weight: 950 !important; color: #0f241c !important; }
    body .right-reference-panel .customer-phone-small { font-size: 10.5px !important; line-height: 1.1 !important; color: #64748b !important; font-weight: 800 !important; }
    body .right-reference-panel .crm-privacy-strip { min-height: 32px !important; padding: 7px 9px !important; border-radius: 13px !important; background: linear-gradient(135deg,#f5f3ff,#ffffff) !important; font-size: 10px !important; line-height: 1.15 !important; font-weight: 900 !important; }
    body .right-reference-panel .reference-detail-list { gap: 6px !important; }
    body .right-reference-panel .reference-detail-row { grid-template-columns: 86px minmax(0,1fr) !important; min-height: 26px !important; padding: 5px 7px !important; gap: 7px !important; border-radius: 11px !important; background: rgba(255,255,255,.75) !important; }
    body .right-reference-panel .reference-detail-row span { font-size: 9.5px !important; line-height: 1.05 !important; font-weight: 900 !important; color: #6b7280 !important; letter-spacing: .045em !important; text-transform: uppercase !important; }
    body .right-reference-panel .reference-detail-row strong { font-size: 10.8px !important; line-height: 1.18 !important; font-weight: 850 !important; color: #1f2937 !important; text-align: right !important; overflow-wrap: anywhere !important; }
    body .right-reference-panel .reference-status-pill, body .right-reference-panel .booking-status-pill, body .right-reference-panel .crm-code-pill { min-height: 20px !important; padding: 4px 8px !important; border-radius: 999px !important; font-size: 9.5px !important; line-height: 1 !important; font-weight: 950 !important; }
    body .right-reference-panel .assign-team-card.branch-team-assignment-card { margin-top: 9px !important; padding: 9px !important; border-radius: 15px !important; background: linear-gradient(135deg,#ffffff,#f0faec) !important; }
    body .right-reference-panel .assign-icon { width: 28px !important; height: 28px !important; min-width: 28px !important; border-radius: 11px !important; font-size: 12px !important; }
    body .right-reference-panel .assign-title { font-size: 11.5px !important; line-height: 1.1 !important; font-weight: 950 !important; color: #16352b !important; }
    body .right-reference-panel .assign-sub, body .right-reference-panel .branch-team-assignment-note { font-size: 9.7px !important; line-height: 1.25 !important; color: #64748b !important; font-weight: 780 !important; }
    body .right-reference-panel .branch-team-select { height: 31px !important; min-height: 31px !important; padding: 6px 9px !important; border-radius: 12px !important; font-size: 10.8px !important; font-weight: 900 !important; }
    body .right-reference-panel .booking-card-helper { padding: 8px 9px !important; border-radius: 12px !important; background: rgba(240,253,244,.88) !important; font-size: 9.8px !important; line-height: 1.32 !important; font-weight: 780 !important; }
    body .right-reference-panel .booking-request-card .reference-detail-row { grid-template-columns: 74px minmax(0,1fr) !important; min-height: 25px !important; }
    body .right-reference-panel #bookingRequestMessage { max-height: 58px !important; overflow: auto !important; white-space: pre-line !important; text-align: right !important; }
    body .right-reference-panel .booking-note-input { height: 32px !important; min-height: 32px !important; padding: 7px 10px !important; border-radius: 12px !important; font-size: 10.8px !important; font-weight: 820 !important; }
    body .right-reference-panel .booking-actions-grid { grid-template-columns: repeat(2,minmax(0,1fr)) !important; gap: 6px !important; margin-top: 8px !important; }
    body .right-reference-panel .booking-action-btn { height: 31px !important; min-height: 31px !important; border-radius: 12px !important; font-size: 10px !important; font-weight: 950 !important; }
    body .right-reference-panel .booking-send-update-btn { height: 34px !important; min-height: 34px !important; margin-top: 7px !important; border-radius: 13px !important; font-size: 10.7px !important; }
    body .right-reference-panel .booking-result-text { min-height: 26px !important; padding: 7px 9px !important; border-radius: 12px !important; font-size: 9.8px !important; line-height: 1.25 !important; font-weight: 780 !important; }
'''
          if marker not in s:
            idx = s.rfind('</style>')
            if idx == -1:
              raise SystemExit('No </style> found')
            s = s[:idx] + css + '\n  ' + s[idx:]
          p.write_text(s, encoding='utf-8')
          PY
          node --check server.js
          if ! git diff --quiet -- server.js; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add server.js
            git commit -m "Apply direct right panel CSS polish"
            git push
          fi

      - name: Validate Render deploy hook secret
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "RENDER_DEPLOY_HOOK_URL secret is missing"
            exit 1
          fi
          case "$RENDER_DEPLOY_HOOK_URL" in
            https://api.render.com/deploy/*)
              echo "Render deploy hook URL format looks valid"
              ;;
            *)
              echo "RENDER_DEPLOY_HOOK_URL does not look like a Render deploy hook URL"
              exit 1
              ;;
          esac

      - name: Trigger Render deploy
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          HTTP_STATUS=$(curl -sS -o /tmp/render-response.txt -w "%{http_code}" -X POST "$RENDER_DEPLOY_HOOK_URL")
          echo "Render deploy hook HTTP status: $HTTP_STATUS"
          cat /tmp/render-response.txt || true
          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            echo "Render deploy hook failed"
            exit 1
          fi
          echo "Render deploy hook triggered successfully"
