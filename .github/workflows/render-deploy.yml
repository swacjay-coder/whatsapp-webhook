name: Deploy to Render

on:
  workflow_dispatch:
  push:
    paths:
      - ".render-deploy-trigger.txt"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Validate Render deploy hook secret
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "RENDER_DEPLOY_HOOK_URL secret is missing"
            exit 1
          fi
          case "$RENDER_DEPLOY_HOOK_URL" in
            https://api.render.com/deploy/*)
              echo "Render deploy hook URL format looks valid"
              ;;
            *)
              echo "RENDER_DEPLOY_HOOK_URL does not look like a Render deploy hook URL"
              exit 1
              ;;
          esac

      - name: Trigger Render deploy
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          HTTP_STATUS=$(curl -sS -o /tmp/render-response.txt -w "%{http_code}" -X POST "$RENDER_DEPLOY_HOOK_URL")
          echo "Render deploy hook HTTP status: $HTTP_STATUS"
          cat /tmp/render-response.txt || true
          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            echo "Render deploy hook failed"
            exit 1
          fi
          echo "Render deploy hook triggered successfully"
