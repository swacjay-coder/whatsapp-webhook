name: Inspect V60 Targets

on:
  push:
    paths:
      - ".inspect-v60-trigger.txt"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check V60 patch and write output
        run: |
          OUT="V60_INSPECTION_OUTPUT.md"
          ERR="V60_PATCH_ERROR.md"
          rm -f "$OUT" "$ERR"

          if ! grep -q v31-5-8-59 server.js; then
            git apply v59.patch
          fi
          node --check server.js

          if git apply --check v60.patch 2> /tmp/v60_patch_error.txt; then
            echo "V60 patch check passed" > "$ERR"
          else
            echo "# V60 Patch Error" > "$ERR"
            echo >> "$ERR"
            cat /tmp/v60_patch_error.txt >> "$ERR"
          fi

          {
            echo "# V60 Inspection Output"
            echo
            echo "Generated by GitHub Actions."
            echo
            echo "## BOT VERSION"
            grep -n "BOT_VERSION" server.js || true
            echo
            echo "## FLOW BOOKING DATA"
            line=$(grep -n "function getWhatsAppFlowBookingData" server.js | head -1 | cut -d: -f1 || true)
            if [ -n "$line" ]; then sed -n "$((line-10)),$((line+80))p" server.js; fi
            echo
            echo "## HANDLE FLOW SUBMIT"
            line=$(grep -n "async function handleWhatsAppFlowBookingSubmit" server.js | head -1 | cut -d: -f1 || true)
            if [ -n "$line" ]; then sed -n "$((line)),$((line+110))p" server.js; fi
            echo
            echo "## STAFF HELPERS"
            line=$(grep -n "function getStaffNotificationNumber" server.js | head -1 | cut -d: -f1 || true)
            if [ -n "$line" ]; then sed -n "$((line-20)),$((line+80))p" server.js; fi
            echo
            echo "## TALK TO TEAM FUNCTIONS"
            line=$(grep -n "function isTalkToTeamText" server.js | head -1 | cut -d: -f1 || true)
            if [ -n "$line" ]; then sed -n "$((line-10)),$((line+80))p" server.js; fi
            echo
            echo "## WEBHOOK PAUSE GATE"
            line=$(grep -n "const isOptInMessage" server.js | head -1 | cut -d: -f1 || true)
            if [ -n "$line" ]; then sed -n "$((line-10)),$((line+80))p" server.js; fi
          } > "$OUT"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$OUT" "$ERR"
          git commit -m "Write V60 patch check output" || echo "No inspection changes"
          git push
